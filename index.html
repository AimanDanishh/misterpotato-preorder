<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mister Potato Preorder</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  background:
    linear-gradient(135deg, rgba(255,120,120,0.6), rgba(255,210,120,0.6)),
    url('https://images.unsplash.com/photo-1541599540903-216a46ca1dc0?q=80&w=1200&auto=format&fit=crop');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
}

.container {
  width: 100%;
  max-width: 700px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 28px;
  padding: 35px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  color: white;
}

h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  margin-bottom: 25px;
  opacity: 0.9;
}

.info-box {
  background: rgba(255,255,255,0.15);
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 25px;
  line-height: 1.8;
}

label {
  display: block;
  margin-top: 18px;
  margin-bottom: 8px;
  font-weight: 600;
}

input,
select {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.18);
  color: white;
  font-size: 15px;
  outline: none;
}

input::placeholder {
  color: rgba(255,255,255,0.7);
}

option {
  color: black;
}

.stock-box {
  margin-top: 20px;
  background: rgba(255,255,255,0.12);
  border-radius: 18px;
  padding: 20px;
}

.stock-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
}

.summary {
  margin-top: 25px;
  background: rgba(255,255,255,0.15);
  padding: 20px;
  border-radius: 18px;
  line-height: 2;
}

.qr {
  text-align: center;
  margin-top: 30px;
}

.qr img {
  width: 220px;
  border-radius: 18px;
  border: 4px solid rgba(255,255,255,0.2);
}

.upload-btn,
.submit-btn,
.channel-btn {
  display: block;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 16px;
  margin-top: 18px;
  text-align: center;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s ease;
}

.upload-btn {
  background: rgba(66,133,244,0.85);
  color: white;
}

.submit-btn {
  background: rgba(255,255,255,0.9);
  color: black;
  cursor: pointer;
}

.submit-btn:hover,
.upload-btn:hover,
.channel-btn:hover {
  transform: translateY(-2px);
}

.channel-btn {
  background: rgba(37,211,102,0.9);
  color: white;
}

.success {
  display: none;
  margin-top: 25px;
  background: rgba(0,255,100,0.12);
  padding: 20px;
  border-radius: 18px;
  text-align: center;
}

.loading {
  opacity: 0.7;
  pointer-events: none;
}

</style>
</head>

<body>

<div class="container">

<h1>🥔 Mister Potato</h1>
<p class="subtitle">Late Night Snack Preorder</p>

<div class="info-box">
RM4 per pack<br>
🚚 Free delivery for 3 packs and above<br>
🚚 RM2 delivery fee for below 3 packs
</div>

<form id="orderForm">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Phone Number</label>
<input type="tel" id="phone" required placeholder="01XXXXXXXX">

<label>Select Flavor</label>
<select id="flavor" required></select>

<label>Quantity</label>
<input type="number" id="quantity" min="1" value="1" required>

<label>Residential College</label>
<select id="college">
<option value="">Select College</option>
<option>KTDI</option>
<option>KTF</option>
<option>KSZ</option>
<option>KRP</option>
<option>Kolej 9 & 10</option>
<option>KTC</option>
<option>KDSE</option>
<option>Kolej Perdana</option>
</select>

<div class="stock-box" id="stockContainer">
Loading stock...
</div>

<div class="summary" id="summary">
Total: RM6
</div>

<div class="qr">
<h3>📱 Scan To Pay</h3>
<br>
<img src="YOUR_QR_IMAGE_LINK_HERE">

<a class="upload-btn"
href="YOUR_GOOGLE_FORM_UPLOAD_LINK"
target="_blank">
Upload Payment Proof
</a>
</div>

<button class="submit-btn" type="submit">
Submit Order
</button>

</form>

<div class="success" id="successBox">
<h2>✅ Order Submitted!</h2>
<br>
<p>Thank you for supporting us 🥔</p>

<a class="channel-btn"
href="YOUR_CHANNEL_LINK"
target="_blank">
Join Channel For Updates
</a>
</div>

</div>

<script>

const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

const flavorSelect = document.getElementById("flavor");
const stockContainer = document.getElementById("stockContainer");
const quantityInput = document.getElementById("quantity");
const summary = document.getElementById("summary");

let stockData = [];

async function loadStock() {

  const response = await fetch(API_URL);
  stockData = await response.json();

  flavorSelect.innerHTML = "";
  stockContainer.innerHTML = "";

  stockData.forEach(item => {

    const option = document.createElement("option");
    option.value = item.flavor;
    option.textContent = `${item.flavor} (${item.stock} left)`;

    if (item.stock <= 0) {
      option.disabled = true;
      option.textContent += " - SOLD OUT";
    }

    flavorSelect.appendChild(option);

    stockContainer.innerHTML += `
      <div class="stock-item">
        <span>${item.flavor}</span>
        <span>${item.stock} left</span>
      </div>
    `;
  });

  updateTotal();
}

function updateTotal() {

  const quantity = Number(quantityInput.value);

  let delivery = 2;

  if (quantity >= 3) {
    delivery = 0;
  }

  const total = quantity * 4 + delivery;

  summary.innerHTML = `
    Quantity: ${quantity}<br>
    Delivery: RM${delivery}<br>
    Total: RM${total}
  `;
}

quantityInput.addEventListener("input", updateTotal);


document.getElementById("orderForm")
.addEventListener("submit", async function(e) {

  e.preventDefault();

  const submitBtn = document.querySelector(".submit-btn");

  submitBtn.innerText = "Submitting...";
  submitBtn.classList.add("loading");

  const quantity = Number(quantityInput.value);

  let delivery = 2;

  if (quantity >= 3) {
    delivery = 0;
  }

  const total = quantity * 4 + delivery;

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    flavor: flavorSelect.value,
    quantity: quantity,
    college: document.getElementById("college").value,
    delivery: delivery,
    total: total
  };

  try {

    const response = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.status === "success") {

      document.getElementById("orderForm").style.display = "none";
      document.getElementById("successBox").style.display = "block";

      loadStock();

    } else {
      alert(result.message);
    }

  } catch (err) {
    alert("Something went wrong.");
  }

  submitBtn.innerText = "Submit Order";
  submitBtn.classList.remove("loading");

});

loadStock();

</script>

</body>
</html>
